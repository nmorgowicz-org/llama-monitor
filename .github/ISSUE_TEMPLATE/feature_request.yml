name: Feature Request
description: Propose a new feature or improvement
title: "feat: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? Tell us about it.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
      placeholder: "It would be great if llama-monitor could..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Rough idea of how it should work (optional).
      placeholder: "Add a --flag that..."

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about.
