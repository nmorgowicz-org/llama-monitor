name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: [self-hosted, linux, proxmox]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu,x86_64-pc-windows-gnu,aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2

      - name: Setup osxcross
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << 'EOF'
          [target.aarch64-apple-darwin]
          linker = "/opt/osxcross/target/bin/aarch64-apple-darwin25.1-clang"
          ar = "/opt/osxcross/target/bin/aarch64-apple-darwin25.1-ar"
          rustflags = ["-C", "link-arg=-isysroot /opt/osxcross/target/SDK/MacOSX26.1.sdk"]
          EOF

      - name: Build all targets
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu
          cargo build --release --target aarch64-unknown-linux-gnu
          cargo build --release --target x86_64-pc-windows-gnu
          cargo build --release --target aarch64-apple-darwin

      - name: Copy binaries
        run: |
          cp target/x86_64-unknown-linux-gnu/release/llama-monitor ./llama-monitor-linux-x86_64
          cp target/aarch64-unknown-linux-gnu/release/llama-monitor ./llama-monitor-linux-aarch64
          cp target/x86_64-pc-windows-gnu/release/llama-monitor.exe ./llama-monitor-windows-x86_64.exe
          cp target/aarch64-apple-darwin/release/llama-monitor ./llama-monitor-macos-aarch64
          chmod +x ./llama-monitor-linux-x86_64 ./llama-monitor-linux-aarch64 ./llama-monitor-macos-aarch64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: |
            llama-monitor-linux-x86_64
            llama-monitor-linux-aarch64
            llama-monitor-windows-x86_64.exe
            llama-monitor-macos-aarch64

  release:
    needs: build
    runs-on: [self-hosted, linux, proxmox]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: .

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            llama-monitor-linux-x86_64
            llama-monitor-linux-aarch64
            llama-monitor-windows-x86_64.exe
            llama-monitor-macos-aarch64
