[package]
name = "llama-monitor"
version = "0.4.0"
edition = "2024"

[dependencies]
    anyhow = "1"
    bytes = "1"
    clap = { version = "4", features = ["derive"] }
    dirs = "6"
    eframe = { version = "0.29", default-features = false, features = [
        "default",
        "glow",
        "default_fonts",
    ] }
    egui = "0.29"
    egui_extras = "0.29"
    futures-util = "0.3"
    http-body-util = "0.1"
    parking_lot = "0.12"
    reqwest = { version = "0.13", default-features = false, features = ["rustls", "stream", "json"] }
    zip = "2"
    serde = { version = "1", features = ["derive"] }
    serde_json = "1"
    sysinfo = "0.38"
    tokio = { version = "1.51", features = ["full"] }
    warp = { version = "0.4", features = ["server", "websocket"] }
    wmi = { version = "0.18.4", features = ["default"] }
    notify-rust = "4"
    webbrowser = "1"
    tray-icon = "0.22"
