name: CodeQL

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'static/**'
      - 'sensor_bridge/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/**.yml'
      - '.github/codeql/**'
  pull_request:
    paths:
      - 'src/**'
      - 'static/**'
      - 'sensor_bridge/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/**.yml'
      - '.github/codeql/**'
  schedule:
    # Weekly scan on Monday at 03:00 UTC — catches new CVEs against unchanged code
    - cron: '0 3 * * 1'

permissions:
  contents: read
  security-events: write
  packages: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: rust
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none
          - language: csharp
            build-mode: none

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: .github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
