name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  actions: write

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.event.pull_request.head.ref, 'release-please--') }}

jobs:
  paths-filter:
    if: >-
      !startsWith(github.event.pull_request.head.ref, 'release-please--') &&
      (github.event.action != 'labeled' || github.event.label.name == 'ready-to-test')
    runs-on: arc-llama-monitor
    outputs:
      code: ${{ steps.filter.outputs.code }}
      ui: ${{ steps.filter.outputs.ui }}
      release: ${{ steps.filter.outputs.release }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'sensor_bridge/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            ui:
              - 'static/**'
              - 'tests/ui/**'
            release:
              - 'src/**'
              - 'sensor_bridge/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'scripts/**'

  check:
    needs: paths-filter
    if: >-
      always() &&
      github.event.pull_request.draft == false &&
      (
        startsWith(github.event.pull_request.head.ref, 'release-please--') ||
        (
          !startsWith(github.event.pull_request.head.ref, 'release-please--') &&
          (github.event.action != 'labeled' || github.event.label.name == 'ready-to-test') &&
          (contains(github.event.pull_request.labels.*.name, 'ready-to-test') ||
           startsWith(github.actor, 'dependabot')) &&
          needs.paths-filter.outputs.code == 'true'
        )
      )
    runs-on: ${{ startsWith(github.event.pull_request.head.ref, 'release-please--') && 'arc-general' || 'arc-llama-monitor' }}
    steps:
      - name: Release PR shortcut
        if: startsWith(github.event.pull_request.head.ref, 'release-please--')
        run: echo "Release-please PR detected; required check intentionally passes without rerunning full CI."

      - uses: actions/checkout@v6
        if: '!startsWith(github.event.pull_request.head.ref, ''release-please--'')'

      - name: Setup Rust
        if: >-
          !startsWith(github.event.pull_request.head.ref, 'release-please--') &&
          needs.paths-filter.outputs.code == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        if: >-
          !startsWith(github.event.pull_request.head.ref, 'release-please--') &&
          needs.paths-filter.outputs.code == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v0-rust"
          shared-key: "llama-monitor-${{ hashFiles('Cargo.lock') }}"
          save-if: "${{ github.ref == 'refs/heads/main' }}"

      - name: Run checks
        if: >-
          !startsWith(github.event.pull_request.head.ref, 'release-please--') &&
          needs.paths-filter.outputs.code == 'true'
        run: |
          git diff --check
          cargo fmt -- --check
          cargo clippy -- -D warnings
          cargo test

      - name: Validate sensor_bridge compiles
        if: >-
          !startsWith(github.event.pull_request.head.ref, 'release-please--') &&
          needs.paths-filter.outputs.code == 'true'
        run: |
          dotnet publish sensor_bridge/sensor_bridge.csproj -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -o sensor_bridge/publish

      - name: No code changes
        if: >-
          !startsWith(github.event.pull_request.head.ref, 'release-please--') &&
          needs.paths-filter.outputs.code != 'true'
        run: echo "No code changes detected, skipping Rust checks"

  ui:
    needs: paths-filter
    if: >-
      always() &&
      !startsWith(github.event.pull_request.head.ref, 'release-please--') &&
      (github.event.action != 'labeled' || github.event.label.name == 'ready-to-test') &&
      needs.paths-filter.outputs.ui == 'true' &&
      github.event.pull_request.draft == false &&
      (contains(github.event.pull_request.labels.*.name, 'ready-to-test') ||
       startsWith(github.actor, 'dependabot'))
    runs-on: arc-llama-monitor
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v0-rust"
          shared-key: "llama-monitor-${{ hashFiles('Cargo.lock') }}"
          save-if: "${{ github.ref == 'refs/heads/main' }}"

      - name: Build binary
        run: cargo build --release

      - name: Make binary executable
        run: chmod +x target/release/llama-monitor

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tests/ui/package-lock.json

      - name: Check static JavaScript syntax
        run: node --check static/app.js

      - name: Install UI test dependencies
        working-directory: tests/ui
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: tests/ui
        run: npx playwright install chromium

      - name: Start UI smoke server
        run: |
          ./target/release/llama-monitor --headless --port 7778 > "$RUNNER_TEMP/llama-monitor-ui.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/llama-monitor-ui.pid"
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:7778 >/dev/null && exit 0
            sleep 1
          done
          cat "$RUNNER_TEMP/llama-monitor-ui.log"
          exit 1

      - name: Run Playwright UI tests
        working-directory: tests/ui
        env:
          LLAMA_MONITOR_UI_URL: http://127.0.0.1:7778
        run: npm test

      - name: Stop UI smoke server
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/llama-monitor-ui.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/llama-monitor-ui.pid")" || true
          fi

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: tests/ui/playwright-report/
          if-no-files-found: ignore
          retention-days: 1

  release-smoke:
    needs: paths-filter
    if: >-
      always() &&
      !startsWith(github.event.pull_request.head.ref, 'release-please--') &&
      (github.event.action != 'labeled' || github.event.label.name == 'ready-to-test') &&
      needs.paths-filter.outputs.release == 'true' &&
      github.event.pull_request.draft == false &&
      (contains(github.event.pull_request.labels.*.name, 'ready-to-test') ||
       startsWith(github.actor, 'dependabot'))
    name: release-smoke (${{ matrix.target }})
    runs-on: arc-llama-monitor
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-pc-windows-gnu
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v0-rust"
          shared-key: "llama-monitor-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}"
          save-if: "${{ github.ref == 'refs/heads/main' }}"
      - name: Preflight release toolchain
        run: bash scripts/release-preflight.sh
      - name: Smoke build ${{ matrix.target }}
        run: bash scripts/build-single-target.sh ${{ matrix.target }}
