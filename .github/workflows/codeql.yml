name: CodeQL

on:
  pull_request:
  schedule:
    # Weekly scan on Monday at 03:00 UTC — catches new CVEs against unchanged code
    - cron: '0 3 * * 1'

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  packages: read

jobs:
  analyze-release-pr:
    name: Analyze (rust)
    if: github.event_name == 'pull_request' && startsWith(github.event.pull_request.head.ref, 'release-please--')
    runs-on: ubuntu-latest
    steps:
      - run: echo "Release-please PR detected; required rust analysis check intentionally passes without rerunning CodeQL."

  paths-filter:
    if: github.event_name == 'schedule' || !startsWith(github.event.pull_request.head.ref, 'release-please--')
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'static/**'
              - 'sensor_bridge/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/codeql/**'

  analyze:
    name: Analyze (${{ matrix.language }})
    needs: paths-filter
    if: github.event_name == 'schedule' || !startsWith(github.event.pull_request.head.ref, 'release-please--')
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: rust
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none
          - language: csharp
            build-mode: none

    steps:
      - uses: actions/checkout@v4

      - name: No code changes
        if: github.event_name != 'schedule' && needs.paths-filter.outputs.code != 'true'
        run: echo "No code changes detected, skipping CodeQL analysis"

      - name: Initialize CodeQL
        if: github.event_name == 'schedule' || needs.paths-filter.outputs.code == 'true'
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: .github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        if: github.event_name == 'schedule' || needs.paths-filter.outputs.code == 'true'
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
