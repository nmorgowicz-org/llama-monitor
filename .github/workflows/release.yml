name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to attach binaries to (e.g. v0.5.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: [self-hosted, linux, proxmox]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu,x86_64-pc-windows-gnu,aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2

      - name: Setup osxcross
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          rustflags = ["-C", "link-arg=-Wl,--allow-shlib-undefined"]

          [target.aarch64-apple-darwin]
          linker = "/opt/osxcross/target/bin/aarch64-apple-darwin25.1-clang"
          ar = "/opt/osxcross/target/bin/aarch64-apple-darwin25.1-ar"
          rustflags = [
            "-C", "link-arg=-fuse-ld=/opt/osxcross/target/bin/aarch64-apple-darwin25.1-ld",
            "-C", "link-arg=-isysroot",
            "-C", "link-arg=/opt/osxcross/target/SDK/MacOSX26.1.sdk",
          ]
          EOF

      - name: Build all targets
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu & pid1=$!
          PKG_CONFIG_ALLOW_CROSS=1 \
            PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig \
            cargo build --release --target aarch64-unknown-linux-gnu & pid2=$!
          cargo build --release --target x86_64-pc-windows-gnu & pid3=$!
          SDKROOT=/opt/osxcross/target/SDK/MacOSX26.1.sdk \
            CC_aarch64_apple_darwin=/opt/osxcross/target/bin/aarch64-apple-darwin25.1-clang \
            AR_aarch64_apple_darwin=/opt/osxcross/target/bin/aarch64-apple-darwin25.1-ar \
            cargo build --release --target aarch64-apple-darwin & pid4=$!
          RESULT=0
          wait $pid1 || RESULT=1
          wait $pid2 || RESULT=1
          wait $pid3 || RESULT=1
          wait $pid4 || RESULT=1
          exit $RESULT

      - name: Copy binaries
        run: |
          cp target/x86_64-unknown-linux-gnu/release/llama-monitor ./llama-monitor-linux-x86_64
          cp target/aarch64-unknown-linux-gnu/release/llama-monitor ./llama-monitor-linux-aarch64
          cp target/x86_64-pc-windows-gnu/release/llama-monitor.exe ./llama-monitor-windows-x86_64.exe
          cp target/aarch64-apple-darwin/release/llama-monitor ./llama-monitor-macos-aarch64
          chmod +x ./llama-monitor-linux-x86_64 ./llama-monitor-linux-aarch64 ./llama-monitor-macos-aarch64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: |
            llama-monitor-linux-x86_64
            llama-monitor-linux-aarch64
            llama-monitor-windows-x86_64.exe
            llama-monitor-macos-aarch64

  release:
    needs: build
    runs-on: [self-hosted, linux, proxmox]
    steps:
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: .

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          generate_release_notes: true
          files: |
            llama-monitor-linux-x86_64
            llama-monitor-linux-aarch64
            llama-monitor-windows-x86_64.exe
            llama-monitor-macos-aarch64
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
