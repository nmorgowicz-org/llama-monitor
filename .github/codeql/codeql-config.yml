# CodeQL configuration
#
# paths-ignore excludes files from ALL analysis for that language.
# Use this only for files where every finding would be a false positive —
# not for silencing one specific query.
#
# For one-off suppressions on a specific line, prefer an inline comment:
#   // CodeQL[rust/path-injection] safe: startup-time path, not user input

paths-ignore:
  # Config file paths are resolved at application startup from
  # ~/.config/llama-monitor/, not from runtime user input.
  # All findings in these files are path-injection false positives.
  - src/config.rs
  - src/presets/mod.rs
  - src/state.rs
  - src/gpu/env.rs
  - src/agent.rs
  - src/models/mod.rs
  # XSS findings in the frontend are false positives — data comes from
  # the backend llama.cpp API, not from user input.
  - static/app.js
  - static/compact.html
