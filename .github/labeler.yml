# GitHub Labeler configuration for PRs
# https://github.com/actions/labeler

# ── File path patterns ──────────────────────────────────────

# Rust code
rust:
  - any:
      - changed-files:
          - any-glob-to-any-file:
              - '**/*.rs'

# C# / .NET
csharp:
  - any:
      - changed-files:
          - any-glob-to-any-file:
              - '**/*.cs'

# JavaScript
javascript:
  - any:
      - changed-files:
          - any-glob-to-any-file:
              - '**/*.js'
              - '**/*.jsx'

# Frontend / UI (static assets)
ui:
  - any:
      - changed-files:
          - any-glob-to-any-file:
              - 'static/**/*.html'
              - 'static/**/*.css'
              - 'static/**/*.js'

# Shell scripts
shell:
  - any:
      - changed-files:
          - any-glob-to-any-file:
              - '**/*.sh'

# CI / CD (file paths + commit title)
ci:
  - any:
      - changed-files:
          - any-glob-to-any-file:
              - '.github/workflows/**'
      - title: '^ci('

github-actions:
  - any:
      - changed-files:
          - any-glob-to-any-file:
              - '.github/workflows/**'

# Documentation (file paths + commit title)
docs:
  - any:
      - changed-files:
          - any-glob-to-any-file:
              - '**/*.md'
              - 'docs/**'
      - title: '^docs('

# Dependencies (Rust)
dependencies:
  - any:
      - changed-files:
          - any-glob-to-any-file:
              - 'Cargo.toml'
              - 'Cargo.lock'

# Node.js dependencies
node-dependencies:
  - any:
      - changed-files:
          - any-glob-to-any-file:
              - 'package.json'
              - 'package-lock.json'

# Tests (file paths + commit title)
test:
  - any:
      - changed-files:
          - any-glob-to-any-file:
              - 'tests/**'
              - '**/*.spec.js'
              - '**/*.test.rs'
      - title: '^test('

# ── Commit message patterns (title only) ────────────────────

fix:
  - any:
      - title: '^fix('

feat:
  - any:
      - title: '^feat('

refactor:
  - any:
      - title: '^refactor('

chore:
  - any:
      - title: '^chore('

perf:
  - any:
      - title: '^perf('
