[package]
name = "llama-monitor"
version = "0.1.0-fork.1"
edition = "2024"

[dependencies]
    anyhow = "1"
    bytes = "1"
    clap = { version = "4", features = ["derive"] }
    dirs = "6"
    futures-util = "0.3"
    reqwest = { version = "0.13", default-features = false, features = ["rustls", "stream"] }
    serde = { version = "1", features = ["derive"] }
    serde_json = "1"
    sysinfo = "0.33"
    tokio = { version = "1.51", features = ["full"] }
    warp = "0.3"
