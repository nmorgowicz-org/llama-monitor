name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to attach binaries to (e.g. v0.5.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: arc-llama-monitor
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: llama-monitor-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            artifact: llama-monitor-linux-aarch64
          - target: x86_64-pc-windows-gnu
            artifact: llama-monitor-windows-x86_64.zip
          - target: aarch64-apple-darwin
            artifact: llama-monitor-macos-aarch64.tar.gz

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: "v0-rust"
          shared-key: "llama-monitor-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}"

      - name: Preflight release toolchain
        run: bash scripts/release-preflight.sh

      - name: Build ${{ matrix.target }}
        run: bash scripts/build-single-target.sh ${{ matrix.target }}

      - name: Build sensor bridge
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: dotnet publish sensor_bridge/sensor_bridge.csproj -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -o sensor_bridge/publish

      - name: Package artifact
        run: |
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-gnu)
              cp target/x86_64-unknown-linux-gnu/release/llama-monitor llama-monitor-linux-x86_64
              chmod +x llama-monitor-linux-x86_64
              ;;
            aarch64-unknown-linux-gnu)
              cp target/aarch64-unknown-linux-gnu/release/llama-monitor llama-monitor-linux-aarch64
              chmod +x llama-monitor-linux-aarch64
              ;;
            x86_64-pc-windows-gnu)
              mkdir -p windows-bundle
              cp target/x86_64-pc-windows-gnu/release/llama-monitor.exe windows-bundle/llama-monitor.exe
              cp sensor_bridge/publish/sensor_bridge.exe windows-bundle/sensor_bridge.exe
              (cd windows-bundle && zip -9 -r ../llama-monitor-windows-x86_64.zip .)
              ;;
            aarch64-apple-darwin)
              cp target/aarch64-apple-darwin/release/llama-monitor llama-monitor-macos-aarch64
              chmod +x llama-monitor-macos-aarch64
              tar -czf llama-monitor-macos-aarch64.tar.gz llama-monitor-macos-aarch64
              ;;
          esac

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 1

  release:
    needs: build
    runs-on: arc-llama-monitor
    steps:
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          client-id: ${{ vars.GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: llama-monitor-*
          merge-multiple: true
          path: .

      - name: Generate SHA-256 checksums
        run: |
          VERSION="${{ github.event_name == 'release' && github.ref_name || github.event.inputs.tag_name }}"
          JSON='{"version":"'${VERSION}'","checksums":{}}'
          for f in \
            llama-monitor-linux-x86_64 \
            llama-monitor-linux-aarch64 \
            llama-monitor-windows-x86_64.zip \
            llama-monitor-macos-aarch64.tar.gz; do
            if [ -f "$f" ]; then
              H=$(sha256sum "$f" | awk '{print $1}')
              JSON=$(echo "$JSON" | jq --arg n "$f" --arg h "$H" \
                '.checksums[$n] = $h')
            fi
          done
          echo "$JSON" | jq . > checksums.json
          cat checksums.json

      - name: Update published release with artifacts
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ github.ref_name }}
          body: ${{ github.event.release.body }}
          files: |
            llama-monitor-linux-x86_64
            llama-monitor-linux-aarch64
            llama-monitor-windows-x86_64.zip
            llama-monitor-macos-aarch64.tar.gz
            checksums.json
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Create manual release with generated notes
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          generate_release_notes: true
          files: |
            llama-monitor-linux-x86_64
            llama-monitor-linux-aarch64
            llama-monitor-windows-x86_64.zip
            llama-monitor-macos-aarch64.tar.gz
            checksums.json
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
