name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to attach binaries to (e.g. v0.5.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: [self-hosted, linux, proxmox]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu,x86_64-pc-windows-gnu,aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v0-rust"
          shared-key: "llama-monitor-${{ hashFiles('Cargo.lock') }}"

      - name: Preflight release toolchain
        run: bash scripts/release-preflight.sh

      - name: Build all targets
        run: bash scripts/build-release-targets.sh

      - name: Copy binaries
        run: |
          cp target/x86_64-unknown-linux-gnu/release/llama-monitor ./llama-monitor-linux-x86_64
          cp target/aarch64-unknown-linux-gnu/release/llama-monitor ./llama-monitor-linux-aarch64
          cp target/x86_64-pc-windows-gnu/release/llama-monitor.exe ./llama-monitor-windows-x86_64.exe
          chmod +x ./llama-monitor-linux-x86_64 ./llama-monitor-linux-aarch64
          cp target/aarch64-apple-darwin/release/llama-monitor ./llama-monitor-macos-aarch64
          chmod +x ./llama-monitor-macos-aarch64
          tar -czf llama-monitor-macos-aarch64.tar.gz llama-monitor-macos-aarch64

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-binaries
          path: |
            llama-monitor-linux-x86_64
            llama-monitor-linux-aarch64
            llama-monitor-windows-x86_64.exe
            llama-monitor-macos-aarch64.tar.gz

  release:
    needs: build
    runs-on: [self-hosted, linux, proxmox]
    steps:
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: release-binaries
          path: .

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          generate_release_notes: true
          files: |
            llama-monitor-linux-x86_64
            llama-monitor-linux-aarch64
            llama-monitor-windows-x86_64.exe
            llama-monitor-macos-aarch64.tar.gz
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
