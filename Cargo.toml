[package]
name = "llama-monitor"
version = "0.3.0"
edition = "2024"

[dependencies]
    anyhow = "1"
    bytes = "1"
    clap = { version = "4", features = ["derive"] }
    dirs = "6"
    futures-util = "0.3"
    http-body-util = "0.1"
    reqwest = { version = "0.13", default-features = false, features = ["rustls", "stream"] }
    serde = { version = "1", features = ["derive"] }
    serde_json = "1"
    sysinfo = "0.38"
    tokio = { version = "1.51", features = ["full"] }
    warp = { version = "0.4", features = ["server", "websocket"] }
