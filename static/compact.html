<!DOCTYPE html>
<html>
<head>
<meta charset='utf-8'>
<title>Llama Monitor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="/css/tokens.css">
<style>
/* Compact tray popover — uses the app's design tokens (tokens.css) so it
   inherits the same dark/light themes and accent palettes as the main UI.
   Theme/palette are applied to <html> from shared localStorage in compact.js. */
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
    width: 240px;
    overflow: hidden;
}
body {
    font-family: var(--font-body, system-ui, -apple-system, sans-serif);
    background: var(--color-bg, #0f1115);
    color: var(--color-text-secondary, #d1d5db);
    font-size: 11px;
    padding: 5px;
}
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 6px;
    background: var(--color-bg-elevated, #1f232a);
    border: 1px solid var(--border-subtle, rgba(255,255,255,0.07));
    border-radius: var(--radius-sm, 8px);
}
.header h1 {
    font-size: 12px;
    color: var(--color-accent, #2dd4bf);
    font-weight: 700;
    letter-spacing: 0.2px;
}
.close-btn {
    background: none;
    border: none;
    color: var(--color-text-muted, #9ca3af);
    font-size: 15px;
    cursor: pointer;
    padding: 0 2px;
    line-height: 1;
    transition: color 0.15s ease;
}
.close-btn:hover { color: var(--color-text-primary, #f9fafb); }
.status-bar {
    padding: 4px 6px 2px;
    font-size: 10px;
    color: var(--color-text-muted, #9ca3af);
}
.status-bar .running { color: var(--color-success, #10b981); }
.status-bar .stopped { color: var(--color-error, #f43f5e); }
.section {
    padding: 4px 6px;
    margin-top: 5px;
    background: var(--color-bg-surface, #16191e);
    border: 1px solid var(--border-subtle, rgba(255,255,255,0.07));
    border-radius: var(--radius-sm, 8px);
}
.section + .section { margin-top: 4px; }
.section-title {
    font-size: 9px;
    color: var(--color-text-muted, #9ca3af);
    font-weight: 600;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.metric-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
}
.metric-row:last-child { margin-bottom: 0; }
.metric-label {
    width: 36px;
    color: var(--color-text-muted, #9ca3af);
    font-size: 10px;
}
.metric-bar-wrap {
    flex: 1 1 auto;
    min-width: 0;
    height: 5px;
    background: var(--color-bg-elevated, #1f232a);
    border-radius: 3px;
    overflow: hidden;
}
.metric-bar {
    height: 100%;
    width: 0%;
    border-radius: 3px;
    transition: width 0.3s ease, background-color 0.3s ease;
}
.metric-bar.cpu { background: var(--metric-load, #22c55e); }
.metric-bar.ram { background: var(--metric-memory, #5eead4); }
.metric-bar.gpu-load { background: var(--metric-clock, #14b8a6); }
.metric-bar.gpu-temp { background: var(--color-warning, #f59e0b); }
.metric-bar.gpu-vram { background: var(--metric-memory, #5eead4); }
.metric-bar.severity-normal { background-color: var(--color-success, #10b981) !important; }
.metric-bar.severity-warning { background-color: var(--color-warning, #f59e0b) !important; }
.metric-bar.severity-critical { background-color: var(--color-error, #f43f5e) !important; }
.metric-value {
    flex: 0 0 auto;
    text-align: right;
    white-space: nowrap;
    font-family: var(--font-mono, monospace);
    font-size: 10px;
    color: var(--color-text-secondary, #d1d5db);
}
.inference-section {
    padding: 4px 6px;
    margin-top: 4px;
    background: var(--color-bg-surface, #16191e);
    border: 1px solid var(--border-subtle, rgba(255,255,255,0.07));
    border-radius: var(--radius-sm, 8px);
}
.inference-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1px 0;
    font-size: 10px;
}
.inference-label {
    color: var(--color-text-muted, #9ca3af);
    flex: 0 0 auto;
}
.inference-value {
    font-family: var(--font-mono, monospace);
    color: var(--color-text-secondary, #d1d5db);
    text-align: right;
}
.dash-line {
    color: var(--color-text-muted, #9ca3af);
    font-family: var(--font-mono, monospace);
    opacity: 0.6;
}
#gpu-sections { display: none; }
#gpu-sections:not(:empty) { display: block; }
.gpu-section {
    padding: 4px 6px;
    margin-top: 4px;
    background: var(--color-bg-surface, #16191e);
    border: 1px solid var(--border-subtle, rgba(255,255,255,0.07));
    border-radius: var(--radius-sm, 8px);
}
.gpu-name {
    font-size: 10px;
    color: var(--color-accent, #2dd4bf);
    font-weight: 600;
    margin-bottom: 4px;
}
</style>
</head>
<body>
<div class="header">
    <h1>llama-monitor</h1>
    <button class="close-btn" id="compact-close">&times;</button>
</div>
<div class="status-bar" id="status-bar">Connecting...</div>

<div class="section" id="cpu-section" data-capability="system">
    <div class="section-title">CPU</div>
    <div class="metric-row">
        <span class="metric-label">Load</span>
        <div class="metric-bar-wrap"><div class="metric-bar cpu" id="cpu-load-bar"></div></div>
        <span class="metric-value" id="cpu-load">—</span>
    </div>
    <div class="metric-row">
        <span class="metric-label">Temp</span>
        <div class="metric-bar-wrap"><div class="metric-bar cpu" id="cpu-temp-bar"></div></div>
        <span class="metric-value" id="cpu-temp">—</span>
    </div>
</div>

<div class="section" id="ram-section" data-capability="system">
    <div class="metric-row">
        <span class="metric-label">RAM</span>
        <div class="metric-bar-wrap"><div class="metric-bar ram" id="ram-bar"></div></div>
        <span class="metric-value" id="ram">—</span>
    </div>
</div>

<div id="gpu-sections" data-capability="gpu"></div>
<div class="status-bar" id="capability-note" style="display:none;"></div>

<div class="inference-section">
    <div class="section-title">Inference</div>
    <div class="inference-row">
        <span class="inference-label">Prompt</span>
        <span class="inference-value" id="inf-prompt"><span class="dash-line">—</span> tok/s</span>
    </div>
    <div class="inference-row">
        <span class="inference-label">Generate</span>
        <span class="inference-value" id="inf-generate"><span class="dash-line">—</span> tok/s</span>
    </div>
    <div class="inference-row">
        <span class="inference-label">Context</span>
        <span class="inference-value" id="inf-context"><span class="dash-line">—</span> %</span>
    </div>
</div>

<script>
window.__COMPACT_PORT__ = __PORT__;
</script>
<script src="/js/compact.js"></script>
</body>
</html>
