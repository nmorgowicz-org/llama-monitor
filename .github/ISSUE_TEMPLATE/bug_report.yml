name: Bug Report
description: Report something that isn't working
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out as much as you can.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected.
      placeholder: "When I do X, Y happens instead of Z..."
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: llama-monitor version (or commit hash)
      placeholder: "v0.7.1"

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      multiple: true
      options:
        - Linux x86_64
        - Linux aarch64
        - Windows x86_64
        - macOS aarch64

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any error output or logs (will be formatted as code)
      render: shell
