name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read
  pull-requests: write
  actions: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    if: github.event.pull_request.draft == false && contains(github.event.pull_request.labels.*.name, 'ready-to-test')
    runs-on: [self-hosted, linux, proxmox]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v0-rust"
          shared-key: "llama-monitor-${{ hashFiles('Cargo.lock') }}"
      - run: git diff --check
      - run: cargo fmt -- --check
      - run: cargo clippy -- -D warnings
      - run: cargo test
      - run: cargo build --release
      - name: Upload binary for UI tests
        uses: actions/upload-artifact@v7
        with:
          name: llama-monitor-binary
          path: target/release/llama-monitor

  ui:
    needs: check
    if: github.event.pull_request.draft == false && contains(github.event.pull_request.labels.*.name, 'ready-to-test')
    runs-on: [self-hosted, linux, proxmox]
    steps:
      - uses: actions/checkout@v6
      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: llama-monitor-binary
          path: target/release/
      - name: Make binary executable
        run: chmod +x target/release/llama-monitor
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tests/ui/package-lock.json
      - name: Check static JavaScript syntax
        run: node --check static/app.js
      - name: Install UI test dependencies
        working-directory: tests/ui
        run: npm ci
      - name: Install Playwright Chromium
        working-directory: tests/ui
        run: npx playwright install chromium
      - name: Start UI smoke server
        run: |
          ./target/release/llama-monitor --headless --port 7778 > "$RUNNER_TEMP/llama-monitor-ui.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/llama-monitor-ui.pid"
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:7778 >/dev/null && exit 0
            sleep 1
          done
          cat "$RUNNER_TEMP/llama-monitor-ui.log"
          exit 1
      - name: Run Playwright UI tests
        working-directory: tests/ui
        env:
          LLAMA_MONITOR_UI_URL: http://127.0.0.1:7778
        run: npm test
      - name: Stop UI smoke server
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/llama-monitor-ui.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/llama-monitor-ui.pid")" || true
          fi
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: tests/ui/playwright-report/
          if-no-files-found: ignore

  release-smoke:
    needs: check
    if: github.event.pull_request.draft == false && contains(github.event.pull_request.labels.*.name, 'ready-to-test')
    runs-on: [self-hosted, linux, proxmox]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu,x86_64-pc-windows-gnu,aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v0-rust"
          shared-key: "llama-monitor-${{ hashFiles('Cargo.lock') }}"
      - name: Preflight release toolchain
        run: bash scripts/release-preflight.sh
      - name: Smoke build cross-compilation targets
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          rustflags = ["-C", "link-arg=-Wl,--allow-shlib-undefined"]

          [target.aarch64-apple-darwin]
          linker = "/opt/osxcross/target/bin/aarch64-apple-darwin25.1-clang"
          ar = "/opt/osxcross/target/bin/aarch64-apple-darwin25.1-ar"
          rustflags = [
            "-C", "link-arg=-fuse-ld=/opt/osxcross/target/bin/aarch64-apple-darwin25.1-ld",
            "-C", "link-arg=-isysroot",
            "-C", "link-arg=/opt/osxcross/target/SDK/MacOSX26.1.sdk",
          ]
          EOF

          PKG_CONFIG_ALLOW_CROSS=1 \
            PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig \
            cargo build --release --target aarch64-unknown-linux-gnu &
          pid1=$!

          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_RUSTFLAGS="-C target-feature=+crt-static" \
            cargo build --release --target x86_64-pc-windows-gnu --no-default-features --features native-tray &
          pid2=$!

          SDKROOT=/opt/osxcross/target/SDK/MacOSX26.1.sdk \
            CC_aarch64_apple_darwin=/opt/osxcross/target/bin/aarch64-apple-darwin25.1-clang \
            AR_aarch64_apple_darwin=/opt/osxcross/target/bin/aarch64-apple-darwin25.1-ar \
            AR=/opt/osxcross/target/bin/aarch64-apple-darwin25.1-ar \
            RANLIB=/opt/osxcross/target/bin/aarch64-apple-darwin25.1-ranlib \
            cargo build --release --target aarch64-apple-darwin &
          pid3=$!

          result=0
          wait "$pid1" || result=1
          wait "$pid2" || result=1
          wait "$pid3" || result=1
          exit "$result"
