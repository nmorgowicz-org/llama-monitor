<!DOCTYPE html>
<html>
<head>
<meta charset='utf-8'>
<title>Llama Monitor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
    width: 240px;
    overflow: hidden;
}
body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #2e3440;
    color: #d8dee9;
    font-size: 11px;
    padding: 4px;
}
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2px 4px;
    background: #3b4252;
    border-radius: 4px 4px 0 0;
}
.header h1 {
    font-size: 12px;
    color: #88c0d1;
    font-weight: 600;
}
.close-btn {
    background: none;
    border: none;
    color: #6a7585;
    font-size: 14px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
}
.close-btn:hover { color: #d8dee9; }
.status-bar {
    padding: 3px 4px;
    font-size: 10px;
    color: #6a7585;
}
.status-bar .running { color: #a3be8c; }
.status-bar .stopped { color: #bf616a; }
.section {
    padding: 3px 4px;
    border-top: 1px solid #4c566a;
}
.section-title {
    font-size: 10px;
    color: #81a1c1;
    font-weight: 600;
    margin-bottom: 2px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
}
.metric-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 2px;
}
.metric-row:last-child { margin-bottom: 0; }
.metric-label {
    width: 35px;
    color: #8899aa;
    font-size: 10px;
}
.metric-bar-wrap {
    flex: 1;
    height: 4px;
    background: #3b4252;
    border-radius: 2px;
    overflow: hidden;
}
.metric-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s ease;
}
.metric-bar.cpu { background: #81a1c1; }
.metric-bar.ram { background: #b48ead; }
.metric-bar.gpu-load { background: #88c0d1; }
.metric-bar.gpu-temp { background: #ebcb8b; }
.metric-bar.gpu-vram { background: #a3be8c; }
.metric-bar.severity-normal { background-color: #a3be8c !important; }
.metric-bar.severity-warning { background-color: #ebcb8b !important; }
.metric-bar.severity-critical { background-color: #bf616a !important; }
.metric-value {
    width: 45px;
    text-align: right;
    font-family: monospace;
    font-size: 10px;
}
.inference-section {
    padding: 3px 4px;
    border-top: 1px solid #4c566a;
}
.inference-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1px 0;
    font-size: 10px;
}
.inference-label {
    color: #8899aa;
    flex: 0 0 auto;
}
.inference-value {
    font-family: monospace;
    color: #d8dee9;
    text-align: right;
}
.dash-line {
    color: #4c566a;
    font-family: monospace;
}
#gpu-sections { display: none; }
#gpu-sections:not(:empty) { display: block; }
.gpu-section {
    padding: 3px 4px;
    border-top: 1px solid #4c566a;
}
.gpu-name {
    font-size: 10px;
    color: #88c0d1;
    font-weight: 600;
    margin-bottom: 2px;
}
</style>
</head>
<body>
<div class="header">
    <h1>llama-monitor</h1>
    <button class="close-btn" onclick="window.close()">&times;</button>
</div>
<div class="status-bar" id="status-bar">Connecting...</div>

<div class="section" id="cpu-section" data-capability="system">
    <div class="section-title">CPU</div>
    <div class="metric-row">
        <span class="metric-label">Load</span>
        <div class="metric-bar-wrap"><div class="metric-bar cpu" id="cpu-load-bar" style="width:0%"></div></div>
        <span class="metric-value" id="cpu-load">—</span>
    </div>
    <div class="metric-row">
        <span class="metric-label">Temp</span>
        <div class="metric-bar-wrap"><div class="metric-bar cpu" id="cpu-temp-bar" style="width:0%"></div></div>
        <span class="metric-value" id="cpu-temp">—</span>
    </div>
</div>

<div class="section" id="ram-section" data-capability="system">
    <div class="metric-row">
        <span class="metric-label">RAM</span>
        <div class="metric-bar-wrap"><div class="metric-bar ram" id="ram-bar" style="width:0%"></div></div>
        <span class="metric-value" id="ram">—</span>
    </div>
</div>

<div id="gpu-sections" data-capability="gpu"></div>
<div class="status-bar" id="capability-note" style="display:none;"></div>

<div class="inference-section">
    <div class="section-title">Inference</div>
    <div class="inference-row">
        <span class="inference-label">Prompt</span>
        <span class="inference-value" id="inf-prompt"><span class="dash-line">—</span> tok/s</span>
    </div>
    <div class="inference-row">
        <span class="inference-label">Generate</span>
        <span class="inference-value" id="inf-generate"><span class="dash-line">—</span> tok/s</span>
    </div>
    <div class="inference-row">
        <span class="inference-label">Context</span>
        <span class="inference-value" id="inf-context"><span class="dash-line">—</span> %</span>
    </div>
</div>

<script>
const PORT = __PORT__;
let ws = null;
let reconnectTimer = null;

function connectWebSocket() {
    if (ws && ws.readyState === WebSocket.OPEN) {
        return;
    }
    try {
        ws = new WebSocket('ws://127.0.0.1:' + PORT + '/ws');
        ws.onopen = function() {
            console.log('WebSocket connected');
            document.getElementById('status-bar').innerHTML = '<span class="running">● Connected</span>';
        };
        ws.onerror = function(e) {
            console.error('WebSocket error:', e);
        };
        ws.onclose = function() {
            console.log('WebSocket closed, reconnecting in 2s...');
            document.getElementById('status-bar').innerHTML = '<span class="stopped">● Disconnected</span>';
            if (reconnectTimer) clearTimeout(reconnectTimer);
            reconnectTimer = setTimeout(connectWebSocket, 2000);
        };
    } catch(e) {
        console.error('Failed to create WebSocket:', e);
        if (reconnectTimer) clearTimeout(reconnectTimer);
        reconnectTimer = setTimeout(connectWebSocket, 2000);
    }
}

connectWebSocket();

function setBar(id, pct, maxVal) {
    const bar = document.getElementById(id);
    if (!bar) return;
    const p = Math.min(100, Math.max(0, (pct / maxVal) * 100));
    bar.style.width = p + '%';
}

function updateStatus(running) {
    const el = document.getElementById('status-bar');
    if (running) {
        el.innerHTML = '<span class="running">● Running</span>';
    } else {
        el.innerHTML = '<span class="stopped">● Stopped</span>';
    }
}

function renderGPUs(gpuEntries) {
    const container = document.getElementById('gpu-sections');
    if (!container) return;
    container.style.display = '';
    container.innerHTML = '';
    for (const [name, m] of gpuEntries) {
        const tempPct = m.temp / 120 * 100;
        const loadPct = m.load;
        const vramPct = m.vram_total > 0 ? (m.vram_used / m.vram_total * 100) : 0;
        const vramGB = (m.vram_used / 1024).toFixed(1);
        const vramTotalGB = (m.vram_total / 1024).toFixed(1);

        const loadSeverity = getSeverity(m.load, 100);
        const tempSeverity = getSeverity(m.temp, 120);
        const vramSeverity = getSeverity(m.vram_used, m.vram_total);

        const div = document.createElement('div');
        div.className = 'gpu-section';
        div.innerHTML =
            '<div class="gpu-name">' + name + '</div>' +
            '<div class="metric-row">' +
                '<span class="metric-label">Load</span>' +
                '<div class="metric-bar-wrap"><div class="metric-bar gpu-load' + (loadSeverity ? ' severity-' + loadSeverity : '') + '" style="width:' + loadPct + '%"></div></div>' +
                '<span class="metric-value">' + m.load + '%</span>' +
            '</div>' +
            '<div class="metric-row">' +
                '<span class="metric-label">Temp</span>' +
                '<div class="metric-bar-wrap"><div class="metric-bar gpu-temp' + (tempSeverity ? ' severity-' + tempSeverity : '') + '" style="width:' + tempPct + '%"></div></div>' +
                '<span class="metric-value">' + Math.round(m.temp) + '°C</span>' +
            '</div>' +
            '<div class="metric-row">' +
                '<span class="metric-label">VRAM</span>' +
                '<div class="metric-bar-wrap"><div class="metric-bar gpu-vram' + (vramSeverity ? ' severity-' + vramSeverity : '') + '" style="width:' + vramPct + '%"></div></div>' +
                '<span class="metric-value">' + vramGB + ' / ' + vramTotalGB + ' GB</span>' +
            '</div>';
        container.appendChild(div);
    }
}

// Expose function to get content dimensions for native resize
window.getContentDimensions = function() {
    let height = 0;
    for (const child of document.body.children) {
        const style = window.getComputedStyle(child);
        if (style.display === 'none') continue;
        const rect = child.getBoundingClientRect();
        height += rect.height;
    }
    const bodyStyle = window.getComputedStyle(document.body);
    height += parseFloat(bodyStyle.paddingTop) + parseFloat(bodyStyle.paddingBottom);
    const width = Math.ceil(Math.max(document.body.getBoundingClientRect().width, document.body.scrollWidth));
    height = Math.ceil(height);
    return { width, height };
};

function reportPopoverSize() {
    if (!window.ipc || !window.ipc.postMessage) return;
    requestAnimationFrame(function() {
        window.ipc.postMessage(JSON.stringify(window.getContentDimensions()));
    });
}

// Signal ready when content is loaded
window.addEventListener('load', function() {
    window.__popoverReady = true;
    reportPopoverSize();
});

function clearMetrics() {
    document.getElementById('cpu-section').style.display = '';
    document.getElementById('ram-section').style.display = '';
    document.getElementById('capability-note').style.display = 'none';
    setBar('cpu-load-bar', 0, 100);
    document.getElementById('cpu-load').textContent = '—';
    setBar('cpu-temp-bar', 0, 120);
    document.getElementById('cpu-temp').textContent = '—';
    setBar('ram-bar', 0, 100);
    document.getElementById('ram').textContent = '—';
    document.getElementById('gpu-sections').innerHTML = '';
    document.getElementById('inf-prompt').innerHTML = '<span class="dash-line">—</span> tok/s';
    document.getElementById('inf-generate').innerHTML = '<span class="dash-line">—</span> tok/s';
    document.getElementById('inf-context').innerHTML = '<span class="dash-line">—</span> %';
    reportPopoverSize();
}

function clearLocalMetrics(reasons) {
    document.getElementById('cpu-section').style.display = 'none';
    document.getElementById('ram-section').style.display = 'none';
    document.getElementById('gpu-sections').innerHTML = '';
    document.getElementById('gpu-sections').style.display = 'none';
    
    const reasonEl = document.getElementById('capability-note');
    if (reasons && (reasons.system || reasons.gpu || reasons.cpu_temp)) {
        reasonEl.style.color = '#bf616a';
        reasonEl.style.textAlign = 'center';
        reasonEl.style.fontStyle = 'italic';
        const reasonList = [];
        if (reasons.system) reasonList.push(getEmptyStateMessage(reasons.system));
        if (reasons.gpu) reasonList.push(getEmptyStateMessage(reasons.gpu));
        if (reasons.cpu_temp) reasonList.push(getEmptyStateMessage(reasons.cpu_temp));
        reasonEl.textContent = Array.from(new Set(reasonList)).join(', ');
        reasonEl.style.display = reasonEl.textContent ? '' : 'none';
    } else {
        reasonEl.style.display = 'none';
    }
    
    reportPopoverSize();
}

function getSeverity(value, max) {
    if (!value || value <= 0) return '';
    const pct = (value / max) * 100;
    if (pct >= 90) return 'critical';
    if (pct >= 70) return 'warning';
    return 'normal';
}

function getEmptyStateMessage(reason, fallback) {
    if (reason === 'RemoteEndpoint') {
        return 'Unavailable (remote)';
    }
    if (reason === 'NoDisplay') {
        return 'Unavailable (no display)';
    }
    if (reason === 'TrayUnavailable') {
        return 'Unavailable (tray)';
    }
    if (reason === 'SensorUnavailable') {
        return 'Temp sensor unavailable';
    }
    if (reason === 'BackendUnavailable') {
        return 'GPU unavailable';
    }
    if (reason === 'CommandMissing') {
        return 'Command missing';
    }
    if (reason === 'PermissionDenied') {
        return 'Permission denied';
    }
    if (reason === 'MetricsUnreachable') {
        return 'Metrics unreachable';
    }
    if (reason === 'NotApplicable') {
        return 'Not applicable';
    }
    if (reason === 'Unavailable') {
        return 'Unavailable';
    }
    return fallback || '—';
}

ws.onmessage = function(e) {
    let d;
    try {
        d = JSON.parse(e.data);
    } catch(err) { return; }

    updateStatus(d.server_running);

    if (!d.server_running) {
        clearMetrics();
        return;
    }

    const gpuAvailable = d.capabilities?.gpu ?? true;
    const systemAvailable = d.capabilities?.system ?? true;
    
    if (!systemAvailable && !gpuAvailable) {
        const reasons = d.availability || {};
        clearLocalMetrics(reasons);
    } else {
        document.getElementById('capability-note').style.display = 'none';
        if (systemAvailable) {
            document.getElementById('cpu-section').style.display = '';
            document.getElementById('ram-section').style.display = '';
        } else {
            document.getElementById('cpu-section').style.display = 'none';
            document.getElementById('ram-section').style.display = 'none';
        }

    const sys = d.system || {};
    const cpuLoad = sys.cpu_load || 0;
    const cpuLoadSeverity = getSeverity(cpuLoad, 100);
    const cpuLoadBar = document.getElementById('cpu-load-bar');
    cpuLoadBar.className = 'metric-bar cpu' + (cpuLoadSeverity ? ' severity-' + cpuLoadSeverity : '');
    setBar('cpu-load-bar', cpuLoad, 100);
    document.getElementById('cpu-load').textContent = cpuLoad > 0 ? cpuLoad + '%' : '—';

    if (sys.cpu_temp_available && sys.cpu_temp > 0) {
        const severity = getSeverity(sys.cpu_temp, 120);
        const tempBar = document.getElementById('cpu-temp-bar');
        tempBar.className = 'metric-bar cpu' + (severity ? ' severity-' + severity : '');
        setBar('cpu-temp-bar', sys.cpu_temp, 120);
        document.getElementById('cpu-temp').textContent = Math.round(sys.cpu_temp) + '°C';
    } else {
        setBar('cpu-temp-bar', 0, 120);
        document.getElementById('cpu-temp').textContent = '—';
        const tempBar = document.getElementById('cpu-temp-bar');
        tempBar.className = 'metric-bar cpu';
    }

    if (sys.ram_total_gb > 0) {
        const ramPct = (sys.ram_used_gb / sys.ram_total_gb) * 100;
        const ramSeverity = getSeverity(ramPct, 100);
        const ramBar = document.getElementById('ram-bar');
        ramBar.className = 'metric-bar ram' + (ramSeverity ? ' severity-' + ramSeverity : '');
        setBar('ram-bar', ramPct, 100);
        document.getElementById('ram').textContent = sys.ram_used_gb.toFixed(1) + ' / ' + sys.ram_total_gb.toFixed(1) + ' GB';
    } else {
        setBar('ram-bar', 0, 100);
        document.getElementById('ram').textContent = '—';
        const ramBar = document.getElementById('ram-bar');
        ramBar.className = 'metric-bar ram';
    }

    const gpuEntries = Object.entries(d.gpu || {});
    
    if (gpuAvailable) {
        renderGPUs(gpuEntries);
    } else {
        document.getElementById('gpu-sections').innerHTML = '';
        document.getElementById('gpu-sections').style.display = 'none';
    }
    }

    const l = d.llama || {};
    const promptRate = l.prompt_tokens_per_sec > 0 ? l.prompt_tokens_per_sec : (l.last_prompt_tokens_per_sec || 0);
    const genRate = l.generation_tokens_per_sec > 0 ? l.generation_tokens_per_sec : (l.last_generation_tokens_per_sec || 0);
    const contextCapacity = l.context_capacity_tokens || l.kv_cache_max || 0;
    const contextLive = l.context_live_tokens || l.kv_cache_tokens || 0;
    const contextPeak = l.context_high_water_tokens || l.kv_cache_high_water || 0;
    const contextLiveAvailable = l.context_live_tokens_available || l.kv_cache_tokens_available;
    if (promptRate > 0) {
        document.getElementById('inf-prompt').innerHTML = promptRate.toFixed(1) + ' tok/s';
    } else {
        document.getElementById('inf-prompt').innerHTML = '<span class="dash-line">—</span> tok/s';
    }
    if (genRate > 0) {
        document.getElementById('inf-generate').innerHTML = genRate.toFixed(1) + ' tok/s';
    } else {
        document.getElementById('inf-generate').innerHTML = '<span class="dash-line">—</span> tok/s';
    }
    if (contextCapacity > 0 && contextLiveAvailable) {
        const ctxPct = ((contextLive / contextCapacity) * 100).toFixed(0);
        document.getElementById('inf-context').innerHTML = contextLive + ' / ' + contextCapacity + ' (' + ctxPct + '%)';
    } else if (contextCapacity > 0) {
        document.getElementById('inf-context').innerHTML = 'cap ' + contextCapacity + (contextPeak > 0 ? ' · peak ' + contextPeak : '');
    } else {
        document.getElementById('inf-context').innerHTML = '<span class="dash-line">—</span> %';
    }
    reportPopoverSize();
};
</script>
</body>
</html>
